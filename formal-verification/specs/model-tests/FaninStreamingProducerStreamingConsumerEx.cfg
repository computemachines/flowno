\* Fan-in streaming test: A (producer) -> C (streaming consumer), B (producer) -> C (streaming consumer)
\* 
\* Run with:
\* java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -workers auto -config FaninStreamingProducerStreamingConsumerEx.cfg FaninStreamingProducerStreamingConsumerEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1, 2}
CONSTANT Edges <- FaninEdges
CONSTANT BreakEdges <- FaninBreakEdges
CONSTANT MinRunLevel <- FaninMinRunLevel

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT AtMostOneActive
INVARIANT StitchAtMostOnce
INVARIANT PcConsistentWithGeneration
INVARIANT ProgressPossible

CHECK_DEADLOCK FALSE
