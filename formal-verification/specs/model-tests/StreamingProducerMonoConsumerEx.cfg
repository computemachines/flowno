\* Simple streaming test: A (producer) -> B (mono consumer)
\* 
\* Run with:
\* java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -workers auto -config StreamingProducerMonoConsumerEx.cfg StreamingProducerMonoConsumerEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1}
CONSTANT Edges <- SimpleEdges
CONSTANT BreakEdges <- SimpleBreakEdges
CONSTANT MinRunLevel <- SimpleMinRunLevel

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT AtMostOneActive
INVARIANT StitchAtMostOnce
INVARIANT PcConsistentWithGeneration
INVARIANT ProgressPossible

CHECK_DEADLOCK FALSE
