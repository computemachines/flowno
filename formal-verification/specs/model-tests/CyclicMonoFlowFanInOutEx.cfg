\* Command to run:
\* java -cp formal-verification/tla2tools.jar:formal-verification/specs/modules:formal-verification/specs/models tlc2.TLC -config formal-verification/specs/model-tests/CyclicMonoFlowFanInOutEx.cfg formal-verification/specs/models/CyclicMonoFlowFanInOutEx.tla

SPECIFICATION Spec
\* Use FairSpec for liveness: SPECIFICATION FairSpec

CONSTANT Nodes = {0, 1, 2, 3}
CONSTANT Edges <- FanInOutEdges
CONSTANT BreakEdges <- FanInOutBreakEdges

\* Bound state space (not an error, just stops exploration)
CONSTRAINT StateConstraint

\* Type checking
INVARIANT TypeOK

\* Safety properties
INVARIANT StitchAtMostOnce
INVARIANT WavefrontTight
INVARIANT ProgressPossible
INVARIANT NoStuck

\* Liveness (requires FairSpec, takes longer)
\* PROPERTY EventuallyQuiescent
\* PROPERTY AllNodesEventuallyStart

CHECK_DEADLOCK FALSE
