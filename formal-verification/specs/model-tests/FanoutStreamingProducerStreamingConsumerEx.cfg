\* Fanout streaming test: A (producer) -> B (streaming consumer), A -> C (streaming consumer)
\* 
\* Run with:
\* java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -workers auto -config FanoutStreamingProducerStreamingConsumerEx.cfg FanoutStreamingProducerStreamingConsumerEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1, 2}
CONSTANT Edges <- FanoutEdges
