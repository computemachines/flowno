\* Cyclic triangle with two streaming edges, one mono edge (break on streaming)
\* 
\* Run with:
\* java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -workers auto -config CyclicTriangleTwoStreamingBreakStreamingEx.cfg CyclicTriangleTwoStreamingBreakStreamingEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1, 2}
CONSTANT Edges <- TriangleEdges
CONSTANT BreakEdges <- TriangleBreakEdges
CONSTANT MinRunLevel <- TriangleMinRunLevel

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT AtMostOneActive
INVARIANT StitchAtMostOnce
INVARIANT PcConsistentWithGeneration
INVARIANT ProgressPossible

CHECK_DEADLOCK FALSE
