CONSTRAINT StateConstraint

\* Type checking
INVARIANT TypeOK

\* Safety properties
INVARIANT StitchAtMostOnce
INVARIANT WavefrontTight
INVARIANT ProgressPossible
INVARIANT NoStuck

CHECK_DEADLOCK FALSE
