\* Command to run:
\* java -XX:+UseParallelGC -cp formal-verification/tla2tools.jar:formal-verification/specs/modules:formal-verification/specs/models tlc2.TLC -workers auto -config formal-verification/specs/model-tests/AlgorithmicCyclicMonoFlowTriangleEx.cfg formal-verification/specs/models/AlgorithmicCyclicMonoFlowTriangleEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1, 2}
CONSTANT Edges <- TriangleEdges
