\* Diamond with left branch streaming, right branch mono
\* 
\* Run with:
\* java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -workers auto -config DiamondLeftStreamingRightMonoEx.cfg DiamondLeftStreamingRightMonoEx.tla

SPECIFICATION Spec

CONSTANT Nodes = {0, 1, 2, 3}
CONSTANT Edges <- DiamondEdges
CONSTANT BreakEdges <- DiamondBreakEdges
CONSTANT MinRunLevel <- DiamondMinRunLevel

CONSTRAINT StateConstraint

INVARIANT TypeOK
INVARIANT AtMostOneActive
INVARIANT StitchAtMostOnce
INVARIANT PcConsistentWithGeneration
INVARIANT ProgressPossible

CHECK_DEADLOCK FALSE
