\* Basic configuration for EventLoop.tla (with queues)
\* Small state space for quick verification

SPECIFICATION SpecExt

CONSTANT MaxTaskId = 2    \* Tasks 0, 1, 2
CONSTANT MaxQueueId = 0   \* Just one queue (queue 0)
CONSTANT MaxQueueSize = 2 \* Queue can hold 2 items

\* Type invariant
INVARIANT TypeOKFull

\* Base safety properties  
INVARIANT AtMostOneRunning
INVARIANT JoinWaitersConsistent
INVARIANT NoZombieWaiters

\* Queue invariants - verify event loop correctness
INVARIANT GetWaitersConsistent
INVARIANT PutWaitersConsistent
INVARIANT WaiterStateConsistent
INVARIANT NoZombieQueueWaiters
INVARIANT ClosedQueueNoWaiters

\* Don't check NoDeadlockExt by default - it will fail (user can create deadlocks)
\* INVARIANT NoDeadlockExt

CHECK_DEADLOCK FALSE
