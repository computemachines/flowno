\* Configuration to test NoDeadlock property for EventLoopBasic.tla
\* This SHOULD find a counterexample - unconstrained joins can create cycles

SPECIFICATION Spec

CONSTANT MaxTaskId = 2   \* Tasks 0, 1, 2 (3 tasks total)

\* Type invariant
INVARIANT TypeOK

\* Safety properties  
INVARIANT AtMostOneRunning
INVARIANT JoinWaitersConsistent
INVARIANT NoZombieWaiters

\* This WILL fail - join cycles cause deadlock
INVARIANT NoDeadlock

\* Don't check for TLC deadlock - we have our own NoDeadlock
CHECK_DEADLOCK FALSE
